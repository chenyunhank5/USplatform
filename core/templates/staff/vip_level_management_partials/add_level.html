<style>
    .add-level-overlay{
        display:none;
        position:fixed;
        inset:0;
        background:rgba(0,0,0,0.70);
        z-index:9999;
        padding-top:120px;
    }

    .add-level-box{
        width:70%;
        max-width:90%;
        background:#111;
        border:1px solid #444;
        margin:0 auto;
        color:white;
    }

    .add-level-header{
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:16px 20px;
        border-bottom:1px solid #555;
        font-size:18px;
        font-weight:bold;
    }

    .add-level-header button{
        background:none;
        border:0;
        color:#aaa;
        font-size:24px;
        cursor:pointer;
    }

    .add-level-grid{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:20px 32px;
        padding:28px 34px;
    }

    .add-level-row{
        display:flex;
        align-items:center;
        gap:14px;
    }

    .add-level-row label{
        width:190px;
        font-size:13px;
        color:#ddd;
        text-align:right;
        line-height:1.3;
    }

    .add-level-row label span{
        color:#ff4d4f;
    }

    .add-level-row input{
        flex:1;
        min-width:260px;
        background:#111;
        border:1px solid #444;
        color:white;
        padding:10px 12px;
        outline:none;
    }

    .add-level-footer{
        border-top:1px solid #555;
        padding:18px 34px;
        text-align:right;
    }

    .add-level-submit{
        background:#409eff;
        color:white;
        border:0;
        padding:9px 22px;
        border-radius:3px;
        cursor:pointer;
        margin-right:8px;
    }

    .add-level-cancel{
        background:#222;
        color:white;
        border:1px solid #555;
        padding:9px 22px;
        border-radius:3px;
        cursor:pointer;
    }
</style>

<div class="add-level-overlay" id="addLevelModal">

    <div class="add-level-box">

        <div class="add-level-header">
            <span>Add VIP Level</span>

            <button type="button" onclick="closeAddLevelModal()">
                ×
            </button>
        </div>

        <form
            method="POST"
            action="{% url 'staff_add_vip_level' %}"
            enctype="multipart/form-data"
        >

            {% csrf_token %}

            <div class="add-level-grid">

                <div class="add-level-row">
                    <label>
                        <span>*</span>
                        Level name
                    </label>

                    <input
                        type="text"
                        name="level_name"
                        placeholder="VIP1"
                        required
                    >
                </div>

                <div class="add-level-row">
                    <label>
                        Icon
                    </label>

                    <input
                        type="file"
                        name="icon"
                    >
                </div>

                <div class="add-level-row">
                    <label>Minimum withdrawal</label>
                    <input type="number" step="0.01" name="minimum_withdrawal" value="50">
                </div>

                <div class="add-level-row">
                    <label>Maximum withdrawal</label>
                    <input type="number" step="0.01" name="maximum_withdrawal" value="99999999">
                </div>

                <div class="add-level-row">
                    <label>
                        <span>*</span>
                        Minimum amount
                    </label>

                    <input
                        type="number"
                        step="0.01"
                        name="minimum_amount"
                        placeholder="0.00"
                        required
                    >
                </div>

                <div class="add-level-row">
                    <label>
                        <span>*</span>
                        Commission rate
                    </label>

                    <input
                        type="number"
                        step="0.0001"
                        name="commission_rate"
                        placeholder="0.00"
                        required
                    >
                </div>

                <div class="add-level-row">
                    <label>
                        <span>*</span>
                        Successive order commission
                    </label>

                    <input
                        type="number"
                        step="0.0001"
                        name="successive_order_commission_rate"
                        placeholder="0.00"
                        required
                    >
                </div>

                <div class="add-level-row">
                    <label>
                        <span>*</span>
                        Maximum task
                    </label>

                    <input
                        type="number"
                        name="maximum_task"
                        placeholder="0"
                        required
                    >
                </div>

            </div>

            <div class="add-level-footer">

                <button type="submit" class="add-level-submit">
                    Submit
                </button>

                <button
                    type="button"
                    class="add-level-cancel"
                    onclick="closeAddLevelModal()"
                >
                    Cancel
                </button>

            </div>

        </form>

    </div>

</div>

<script>
function openAddLevelModal(){
    document.getElementById('addLevelModal').style.display = 'block';
}

function closeAddLevelModal(){
    document.getElementById('addLevelModal').style.display = 'none';
}
</script>
