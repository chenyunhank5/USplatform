<style>
    .edit-product-overlay{
        display:none;
        position:fixed;
        inset:0;
        background:rgba(0,0,0,0.70);
        z-index:9999;
        padding-top:60px;
    }

    .edit-product-box{
        width:950px;
        max-width:92%;
        background:#111;
        border:1px solid #444;
        margin:0 auto;
        color:white;
    }

    .edit-product-header{
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:16px 20px;
        border-bottom:1px solid #555;
        font-size:18px;
        font-weight:bold;
    }

    .edit-product-header button{
        background:none;
        border:0;
        color:#aaa;
        font-size:24px;
        cursor:pointer;
    }

    .edit-product-grid{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:22px 30px;
        padding:30px;
    }

    .edit-product-row{
        display:flex;
        flex-direction:column;
        gap:8px;
    }

    .edit-product-row label{
        font-size:13px;
        color:#ddd;
        font-weight:bold;
    }

    .edit-product-row input,
    .edit-product-row select{
        width:100%;
        background:#0f0f0f;
        border:1px solid #444;
        color:white;
        padding:11px 12px;
        outline:none;
        border-radius:3px;
    }

    .image-input-group{
        display:flex;
        align-items:center;
        gap:12px;
    }

    .preview-image{
        width:52px;
        height:52px;
        object-fit:cover;
        border-radius:6px;
        border:1px solid #444;
        background:#1a1a1a;
        flex-shrink:0;
    }

    .edit-product-description{
        padding:0 30px 28px;
    }

    .edit-product-description label{
        display:block;
        margin-bottom:8px;
        color:#ddd;
        font-size:13px;
        font-weight:bold;
    }

    .edit-product-description textarea{
        width:100%;
        min-height:190px;
        background:#0f0f0f;
        border:1px solid #444;
        color:#e5e7eb;
        padding:14px;
        outline:none;
        resize:vertical;
        font-family:Consolas, monospace;
        font-size:13px;
        line-height:1.5;
        border-radius:3px;
    }

    .edit-product-row input:focus,
    .edit-product-row select:focus,
    .edit-product-description textarea:focus{
        border-color:#409eff;
    }

    .edit-product-footer{
        border-top:1px solid #555;
        padding:18px 30px;
        text-align:right;
    }

    .edit-product-submit{
        background:#409eff;
        color:white;
        border:0;
        padding:10px 24px;
        border-radius:3px;
        cursor:pointer;
        margin-right:8px;
    }

    .edit-product-cancel{
        background:#222;
        color:white;
        border:1px solid #555;
        padding:10px 24px;
        border-radius:3px;
        cursor:pointer;
    }
</style>

<div class="edit-product-overlay" id="editProductModal">

    <div class="edit-product-box">

        <div class="edit-product-header">
            <span>Edit Goods</span>

            <button type="button" onclick="closeEditProductModal()">
                ×
            </button>
        </div>

        <form method="POST" id="editProductForm">
            {% csrf_token %}

            <div class="edit-product-grid">

                <div class="edit-product-row">
                    <label>Goods Name</label>
                    <input type="text" name="name" id="editProductName" required>
                </div>

                <div class="edit-product-row">
                    <label>Price</label>
                    <input type="number" step="0.01" name="price" id="editProductPrice" required>
                </div>

                <div class="edit-product-row">
                    <label>Cover URL</label>

                    <div class="image-input-group">
                        <input
                            type="url"
                            name="cover"
                            id="editProductCover"
                            oninput="updateImagePreview(this, 'coverPreview')"
                        >

                        <img id="coverPreview" class="preview-image" src="">
                    </div>
                </div>

                <div class="edit-product-row">
                    <label>Score</label>

                    <select name="score" id="editProductScore">
                        <option value="0">0 Star</option>
                        <option value="1">1 Star</option>
                        <option value="2">2 Stars</option>
                        <option value="3">3 Stars</option>
                        <option value="4">4 Stars</option>
                        <option value="5">5 Stars</option>
                    </select>
                </div>

                <div class="edit-product-row">
                    <label>Goods Album 1</label>

                    <div class="image-input-group">
                        <input
                            type="url"
                            name="goods_album_1"
                            id="editAlbum1"
                            oninput="updateImagePreview(this, 'albumPreview1')"
                        >

                        <img id="albumPreview1" class="preview-image" src="">
                    </div>
                </div>

                <div class="edit-product-row">
                    <label>Goods Album 2</label>

                    <div class="image-input-group">
                        <input
                            type="url"
                            name="goods_album_2"
                            id="editAlbum2"
                            oninput="updateImagePreview(this, 'albumPreview2')"
                        >

                        <img id="albumPreview2" class="preview-image" src="">
                    </div>
                </div>

                <div class="edit-product-row">
                    <label>Goods Album 3</label>

                    <div class="image-input-group">
                        <input
                            type="url"
                            name="goods_album_3"
                            id="editAlbum3"
                            oninput="updateImagePreview(this, 'albumPreview3')"
                        >

                        <img id="albumPreview3" class="preview-image" src="">
                    </div>
                </div>

                <div class="edit-product-row">
                    <label>Goods Album 4</label>

                    <div class="image-input-group">
                        <input
                            type="url"
                            name="goods_album_4"
                            id="editAlbum4"
                            oninput="updateImagePreview(this, 'albumPreview4')"
                        >

                        <img id="albumPreview4" class="preview-image" src="">
                    </div>
                </div>

            </div>

            <div class="edit-product-description">
                <label>Description / HTML Code</label>

                <textarea
                    name="description"
                    id="editProductDescription"
                    placeholder="Write product details or paste HTML code here..."
                ></textarea>
            </div>

            <div class="edit-product-footer">
                <button type="submit" class="edit-product-submit">
                    Submit
                </button>

                <button type="button" class="edit-product-cancel" onclick="closeEditProductModal()">
                    Cancel
                </button>
            </div>

        </form>

    </div>

</div>

<script>
function updateImagePreview(input, previewId){
    document.getElementById(previewId).src = input.value || '';
}

function openEditProductModal(
    id,
    name,
    cover,
    price,
    score,
    description,
    album1,
    album2,
    album3,
    album4
){
    document.getElementById('editProductModal').style.display = 'block';

    document.getElementById('editProductForm').action =
        '/staff/product/' + id + '/edit/';

    document.getElementById('editProductName').value = name || '';
    document.getElementById('editProductCover').value = cover || '';
    document.getElementById('editProductPrice').value = price || '0';
    document.getElementById('editProductScore').value = score || '0';
    document.getElementById('editProductDescription').value = description || '';

    document.getElementById('editAlbum1').value = album1 || '';
    document.getElementById('editAlbum2').value = album2 || '';
    document.getElementById('editAlbum3').value = album3 || '';
    document.getElementById('editAlbum4').value = album4 || '';

    document.getElementById('coverPreview').src = cover || '';
    document.getElementById('albumPreview1').src = album1 || '';
    document.getElementById('albumPreview2').src = album2 || '';
    document.getElementById('albumPreview3').src = album3 || '';
    document.getElementById('albumPreview4').src = album4 || '';
}

function closeEditProductModal(){
    document.getElementById('editProductModal').style.display = 'none';
}
</script>
