<style>
    .add-product-overlay{
        display:none;
        position:fixed;
        inset:0;
        background:rgba(0,0,0,0.70);
        z-index:9999;
        padding-top:90px;
    }

    .add-product-box{
        width:760px;
        max-width:92%;
        background:#111;
        border:1px solid #444;
        margin:0 auto;
        color:white;
    }

    .add-product-header{
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:16px 20px;
        border-bottom:1px solid #555;
        font-size:18px;
        font-weight:bold;
    }

    .add-product-header button{
        background:none;
        border:0;
        color:#aaa;
        font-size:24px;
        cursor:pointer;
    }

    .add-product-grid{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:22px 30px;
        padding:30px;
    }

    .add-product-row{
        display:flex;
        flex-direction:column;
        gap:8px;
    }

    .add-product-row label{
        font-size:13px;
        color:#ddd;
        font-weight:bold;
    }

    .add-product-row label span{
        color:#ff4d4f;
    }

    .add-product-row input,
    .add-product-row select{
        width:100%;
        background:#0f0f0f;
        border:1px solid #444;
        color:white;
        padding:11px 12px;
        outline:none;
        border-radius:3px;
    }

    .add-product-row input:focus,
    .add-product-row select:focus{
        border-color:#409eff;
    }

    .add-product-footer{
        border-top:1px solid #555;
        padding:18px 30px;
        text-align:right;
    }

    .add-product-submit{
        background:#409eff;
        color:white;
        border:0;
        padding:10px 24px;
        border-radius:3px;
        cursor:pointer;
        margin-right:8px;
    }

    .add-product-cancel{
        background:#222;
        color:white;
        border:1px solid #555;
        padding:10px 24px;
        border-radius:3px;
        cursor:pointer;
    }
</style>

<div class="add-product-overlay" id="addProductModal">

    <div class="add-product-box">

        <div class="add-product-header">

            <span>Add Goods</span>

            <button type="button" onclick="closeAddProductModal()">
                ×
            </button>

        </div>

        <form method="POST" action="{% url 'staff_add_product' %}">

            {% csrf_token %}

            <div class="add-product-grid">

                <div class="add-product-row">

                    <label>
                        <span>*</span>
                        Goods Name
                    </label>

                    <input
                        type="text"
                        name="name"
                        placeholder="Please enter goods name"
                        required
                    >

                </div>

                <div class="add-product-row">

                    <label>
                        <span>*</span>
                        Price
                    </label>

                    <input
                        type="number"
                        step="0.01"
                        name="price"
                        placeholder="0.00"
                        required
                    >

                </div>

                <div class="add-product-row">

                    <label>
                        Cover URL
                    </label>

                    <input
                        type="url"
                        name="cover"
                        placeholder="https://example.com/image.jpg"
                    >

                </div>

                <div class="add-product-row">

                    <label>
                        Score
                    </label>

                    <select name="score">

                        <option value="0">0 Star</option>
                        <option value="1">1 Star</option>
                        <option value="2">2 Stars</option>
                        <option value="3">3 Stars</option>
                        <option value="4">4 Stars</option>
                        <option value="5" selected>5 Stars</option>

                    </select>

                </div>

            </div>

            <div class="add-product-footer">

                <button type="submit" class="add-product-submit">
                    Submit
                </button>

                <button
                    type="button"
                    class="add-product-cancel"
                    onclick="closeAddProductModal()"
                >
                    Cancel
                </button>

            </div>

        </form>

    </div>

</div>

<script>

function openAddProductModal(){
    document.getElementById('addProductModal').style.display = 'block';
}

function closeAddProductModal(){
    document.getElementById('addProductModal').style.display = 'none';
}

</script>
