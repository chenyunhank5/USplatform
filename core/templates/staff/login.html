<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Staff Login</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#111;
            color:white;
            height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .login-box{
            width:360px;
            background:#181818;
            border:1px solid #333;
            padding:28px;
        }

        h2{
            margin:0 0 22px;
            text-align:center;
        }

        input{
            width:100%;
            background:#111;
            border:1px solid #444;
            color:white;
            padding:12px;
            margin-bottom:14px;
            outline:none;
        }

        button{
            width:100%;
            background:#409eff;
            color:white;
            border:0;
            padding:12px;
            cursor:pointer;
            font-weight:bold;
        }

        .error{
            background:#7f1d1d;
            color:#fca5a5;
            padding:10px;
            margin-bottom:14px;
            font-size:13px;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h2>Staff Login</h2>

    {% for message in messages %}
        <div class="error">{{ message }}</div>
    {% endfor %}

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Staff username" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">
            Login
        </button>
    </form>

</div>

</body>
</html>
