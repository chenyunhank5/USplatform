<div id="luckyRewardOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.70);z-index:999999;overflow:auto;padding-top:70px;">

    <div style="width:760px;max-width:95%;background:#111;border:1px solid #444;margin:auto;color:white;">

        <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid #444;font-size:17px;font-weight:bold;">
            <span>Add lucky reward</span>

            <button type="button" onclick="closeLuckyRewardModal()" style="background:none;border:0;color:#aaa;font-size:24px;cursor:pointer;">
                ×
            </button>
        </div>

        <form method="POST" action="{% url 'staff_add_lucky_reward' %}">
            {% csrf_token %}

            <input type="hidden" name="profile_id" value="{{ profile.id }}">

            <div style="padding:24px;">

                <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
                    <div>
                        <label style="display:block;margin-bottom:8px;font-size:13px;font-weight:bold;">
                            Current balance
                        </label>

                        <input type="text" value="{{ profile.balance }}" readonly style="width:100%;background:#151515;border:1px solid #444;color:white;padding:11px 12px;box-sizing:border-box;">
                    </div>

                    <div>
                        <label style="display:block;margin-bottom:8px;font-size:13px;font-weight:bold;">
                            The N order
                        </label>

                        <input type="number" name="target_order_number" value="{{ profile.task_progress|add:1 }}" required style="width:100%;background:#151515;border:1px solid #444;color:white;padding:11px 12px;box-sizing:border-box;">
                    </div>
                </div>

                <br>

                <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
                    <div>
                        <label style="display:block;margin-bottom:8px;font-size:13px;font-weight:bold;">
                            Presented payout
                        </label>

                        <input type="number" step="0.01" name="payout_amount" required style="width:100%;background:#151515;border:1px solid #444;color:white;padding:11px 12px;box-sizing:border-box;">
                    </div>

                    <div>
                        <label style="display:block;margin-bottom:8px;font-size:13px;font-weight:bold;">
                            Payout jump time
                        </label>

                        <input type="number" name="payout_jump_time" value="10" min="1" required style="width:100%;background:#151515;border:1px solid #444;color:white;padding:11px 12px;box-sizing:border-box;">
                    </div>
                </div>

                <br>

                <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
                    <div>
                        <label style="display:block;margin-bottom:8px;font-size:13px;font-weight:bold;">
                            Freeze reward / Need CS confirmation
                        </label>

                        <select name="freeze_reward" style="width:100%;background:#151515;border:1px solid #444;color:white;padding:11px 12px;box-sizing:border-box;">
                            <option value="no">No</option>
                            <option value="yes">Yes</option>
                        </select>
                    </div>

                    <div>
                        <label style="display:block;margin-bottom:8px;font-size:13px;font-weight:bold;">
                            Designate user
                        </label>

                        <input type="text" value="{{ profile.user.username }}" readonly style="width:100%;background:#151515;border:1px solid #444;color:white;padding:11px 12px;box-sizing:border-box;">
                    </div>
                </div>
            </div>

            <div style="border-top:1px solid #333;padding:16px 24px;text-align:right;">
                <button type="submit" style="background:#409eff;color:white;border:0;padding:10px 22px;border-radius:3px;cursor:pointer;margin-right:8px;">
                    Confirm
                </button>

                <button type="button" onclick="closeLuckyRewardModal()" style="background:#222;color:white;border:1px solid #555;padding:10px 22px;border-radius:3px;cursor:pointer;">
                    Cancel
                </button>
            </div>
        </form>

    </div>

</div>

<script>
function openLuckyRewardModal(){
    document.getElementById("luckyRewardOverlay").style.display = "block";
}

function closeLuckyRewardModal(){
    document.getElementById("luckyRewardOverlay").style.display = "none";
}
</script>
