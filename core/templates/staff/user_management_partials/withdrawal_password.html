<div class="security-overlay" id="withdrawalPasswordModal">
    <div class="security-box">
        <div class="security-header">
            <span>Edit Withdrawal Password</span>
            <button type="button" onclick="closeWithdrawalPasswordModal()">×</button>
        </div>

        <form method="POST" id="withdrawalPasswordForm">
            {% csrf_token %}

            <div class="security-body">
                <label>New withdrawal password</label>
                <input type="password" name="new_password" required>
            </div>

            <div class="security-footer">
                <button type="submit" class="security-submit">Submit</button>
                <button type="button" class="security-cancel" onclick="closeWithdrawalPasswordModal()">Cancel</button>
            </div>
        </form>
    </div>
</div>

<script>
function openWithdrawalPasswordModal(profileId){
    document.getElementById('floatingOperateMenu').style.display = 'none';
    document.getElementById('withdrawalPasswordForm').action = '/staff/user/' + profileId + '/withdrawal-password/';
    document.getElementById('withdrawalPasswordModal').style.display = 'block';
}

function closeWithdrawalPasswordModal(){
    document.getElementById('withdrawalPasswordModal').style.display = 'none';
}
</script>
