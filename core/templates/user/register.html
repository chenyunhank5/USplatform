<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            background:#f3f4f6;
        }

        .mobile-page{
            max-width:430px;
            margin:0 auto;
            min-height:100vh;
            background:#f3f4f6;
            position:relative;
            overflow:hidden;
        }

        /* =========================
           TOP BAR
        ========================== */

        .topbar{
            height:56px;
            background:#000;
            color:#fff;

            display:flex;
            align-items:center;
            justify-content:center;

            position:relative;

            font-size:22px;
            font-weight:bold;
        }

        .back-btn{
            position:absolute;
            left:16px;
            top:50%;
            transform:translateY(-50%);

            color:white;
            text-decoration:none;

            font-size:34px;
            font-weight:300;
            cursor:pointer;
        }

        /* =========================
           LOGO
        ========================== */

        .logo-wrapper{
            padding-top:28px;
            padding-bottom:12px;
        }

        .logo-box{
            width:230px;
            margin:auto;

            display:flex;
            align-items:center;
            justify-content:center;
            flex-direction:column;
        }

        .logo-title{
            font-size:62px;
            line-height:0.95;
            color:#4b4b4b;
            font-weight:300;
            letter-spacing:2px;
            text-align:center;
        }

        /* =========================
           CARD
        ========================== */

        .form-card{
            background:#fff;

            margin:0 22px;

            border-radius:2px;

            padding:4px 18px 10px;
        }

        .form-group{
            border-bottom:1px solid #ececec;
            padding:16px 0 12px;
        }

        .form-group:last-child{
            border-bottom:none;
        }

        .label{
            font-size:15px;
            font-weight:bold;
            color:#111827;

            margin-bottom:10px;
        }

        .invite-label{
            color:#f78522;
        }

        .input-row{
            display:flex;
            align-items:center;
        }

        .input-row input{
            width:100%;
            border:none;
            outline:none;

            background:transparent;

            font-size:15px;
            color:#111827;
        }

        .input-row input::placeholder{
            color:#c4c7cf;
        }

        .right-input input{
            text-align:right;
        }

        /* =========================
           PASSWORD EYE
        ========================== */

        .eye-btn{
            width:24px;
            height:24px;

            display:flex;
            align-items:center;
            justify-content:center;

            cursor:pointer;

            color:#555;

            margin-left:8px;
            user-select:none;

            font-size:24px;
        }

        /* =========================
           GENDER
        ========================== */

        .gender-row{
            display:flex;
            align-items:center;
        }

        .gender-options{
            margin-left:auto;

            display:flex;
            align-items:center;
            gap:14px;
        }

        .gender-options label{
            display:flex;
            align-items:center;
            gap:5px;

            color:#f78522;
            font-size:15px;
        }

        .gender-options input{
            width:18px;
            height:18px;
        }

        /* =========================
           AGREEMENT
        ========================== */

        .agree-box{
            display:flex;
            justify-content:center;
            align-items:center;

            gap:8px;

            margin:18px 0 24px;

            font-size:14px;
            color:#f78522;
            font-weight:bold;
        }

        .agree-box input{
            width:18px;
            height:18px;
        }

        /* =========================
           BUTTON
        ========================== */

        .register-btn{
            width:calc(100% - 44px);
            margin:0 auto 30px;

            height:56px;

            border:none;
            border-radius:4px;

            background:#000;
            color:#fff;

            font-size:28px;
            font-weight:500;

            display:block;

            cursor:pointer;

            transition:0.2s;
        }

        .register-btn:active{
            transform:scale(0.98);
        }

        /* =========================
           TOAST MESSAGE
        ========================== */

        .toast-container{
            position:fixed;
            top:20px;
            left:50%;
            transform:translateX(-50%);
            z-index:9999;
        }

        .toast{
            min-width:220px;
            max-width:300px;

            background:#2c2c2c;
            color:#fff;

            padding:14px 18px;

            border-radius:10px;

            text-align:center;

            font-size:14px;

            box-shadow:0 10px 20px rgba(0,0,0,0.18);

            animation:fadeIn 0.3s ease;
        }

        .toast.success{
            background:#16a34a;
        }

        .toast.error{
            background:#1f2937;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(-10px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

    </style>
</head>

<body>

<div class="mobile-page">

    <!-- TOP BAR -->

    <div class="topbar">

        <a href="{% url 'user_login' %}" class="back-btn">
            ‹
        </a>

        Register

    </div>

    <!-- LOGO -->

    <div class="logo-wrapper">

        <div class="logo-box">

            <div class="logo-title">
                MAJOR
            </div>

            <div class="logo-title">
                TOM
            </div>

        </div>

    </div>

    <!-- TOAST MESSAGES -->

    {% if messages %}

    <div class="toast-container">

        {% for message in messages %}

            <div class="toast {% if message.tags %}{{ message.tags }}{% endif %}">
                {{ message }}
            </div>

        {% endfor %}

    </div>

    {% endif %}

    <!-- FORM -->

    <form method="POST">

        {% csrf_token %}

        <div class="form-card">

            <!-- USERNAME -->

            <div class="form-group right-input">

                <div class="label">
                    Username
                </div>

                <div class="input-row">

                    <input
                        type="text"
                        name="username"
                        placeholder="Username"
                        required
                    >

                </div>

            </div>

            <!-- PHONE -->

            <div class="form-group right-input">

                <div class="label">
                    Phone
                </div>

                <div class="input-row">

                    <input
                        type="text"
                        name="phone_number"
                        placeholder="Phone"
                        required
                    >

                </div>

            </div>

            <!-- TRANSACTION PASSWORD -->

            <div class="form-group">

                <div class="label">
                    Transaction Password
                </div>

                <div class="input-row">

                    <input
                        type="password"
                        name="transaction_password"
                        placeholder="Transaction Password"
                        required
                        class="password-input"
                    >

                    <div class="eye-btn">
                        👁
                    </div>

                </div>

            </div>

            <!-- PASSWORD -->

            <div class="form-group">

                <div class="label">
                    Password
                </div>

                <div class="input-row">

                    <input
                        type="password"
                        name="password"
                        placeholder="Password"
                        required
                        class="password-input"
                    >

                    <div class="eye-btn">
                        👁
                    </div>

                </div>

            </div>

            <!-- CONFIRM PASSWORD -->

            <div class="form-group">

                <div class="label">
                    Confirm Password
                </div>

                <div class="input-row">

                    <input
                        type="password"
                        name="confirm_password"
                        placeholder="Confirm Password"
                        required
                        class="password-input"
                    >

                    <div class="eye-btn">
                        👁
                    </div>

                </div>

            </div>

            <!-- GENDER -->

            <div class="form-group gender-row">

                <div class="label">
                    Gender
                </div>

                <div class="gender-options">

                    <label>

                        <input
                            type="radio"
                            name="gender"
                            value="male"
                            required
                        >

                        Male

                    </label>

                    <label>

                        <input
                            type="radio"
                            name="gender"
                            value="female"
                            required
                        >

                        Female

                    </label>

                </div>

            </div>

            <!-- INVITE -->

            <div class="form-group right-input">

                <div class="label invite-label">
                    Invite Code
                </div>

                <div class="input-row">

                    <input
                        type="text"
                        name="invite_code"
                        placeholder="Invite Code"
                        maxlength="6"
                        required
                    >

                </div>

            </div>

        </div>

        <!-- AGREEMENT -->

        <label class="agree-box">

            <input type="checkbox" required>

            Agree To Use The Relevant Treaties

        </label>

        <!-- BUTTON -->

        <button class="register-btn" type="submit">
            Register
        </button>

    </form>

</div>

<!-- =========================
     JAVASCRIPT
========================= -->

<script>

    // AUTO HIDE TOAST

    setTimeout(() => {

        const toasts = document.querySelectorAll('.toast');

        toasts.forEach((toast) => {

            toast.style.transition = '0.4s';
            toast.style.opacity = '0';
            toast.style.transform = 'translateY(-10px)';

            setTimeout(() => {
                toast.remove();
            }, 400);

        });

    }, 2500);

    // PASSWORD SHOW/HIDE

    const eyeButtons = document.querySelectorAll('.eye-btn');

    eyeButtons.forEach((btn) => {

        btn.addEventListener('click', function(){

            const input = this.parentElement.querySelector('input');

            if(input.type === 'password'){
                input.type = 'text';
            }else{
                input.type = 'password';
            }

        });

    });

</script>

</body>
</html>
