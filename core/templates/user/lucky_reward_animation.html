<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fund Awards</title>

<style>
body{
    margin:0;
    background:#050505;
    font-family:Arial,sans-serif;
    max-width:430px;
    margin:auto;
    min-height:100vh;
    color:white;
    overflow:hidden;
}

.reward-page{
    min-height:100vh;
    padding:24px 18px;
    box-sizing:border-box;
    position:relative;
    background:radial-gradient(circle at top,#333 0%,#080808 42%,#000 100%);
}

.wallet-box{
    background:rgba(255,255,255,.08);
    border-radius:12px;
    padding:12px 16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:20px;
    box-shadow:0 0 18px rgba(255,215,0,.12);
}

.wallet-label{
    font-size:20px;
    font-weight:bold;
    line-height:1.05;
}

.wallet-value{
    font-size:34px;
    font-weight:900;
}

.wallet-value span{
    color:#ffd600;
    font-size:13px;
}

.title{
    text-align:center;
    color:#ffd600;
    font-size:44px;
    font-weight:900;
    margin-top:28px;
    text-shadow:0 0 18px rgba(255,214,0,.45);
}

.subtitle{
    text-align:center;
    font-size:23px;
    font-weight:bold;
    line-height:1.25;
    margin-top:10px;
}

.amount-area{
    margin-top:40px;
    height:190px;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

.gold-wave{
    position:absolute;
    bottom:12px;
    width:120%;
    height:110px;
    background:linear-gradient(90deg,#5a2a00,#ff9d00,#ffd35a,#6b3200);
    filter:blur(1px);
    opacity:.9;
    border-radius:50%;
    animation:waveMove 2.6s infinite alternate ease-in-out;
}

@keyframes waveMove{
    from{
        transform:translateX(-20px) scaleY(.75);
    }

    to{
        transform:translateX(20px) scaleY(1);
    }
}

.amount-text{
    position:relative;
    z-index:2;
    font-size:54px;
    font-weight:900;
    color:white;
    text-shadow:0 0 16px rgba(255,255,255,.65);
}

.amount-text .x{
    color:#ffd600;
    margin-right:8px;
}

.amount-text .usd{
    color:#ffd600;
    font-size:15px;
    margin-left:6px;
}

.note{
    position:absolute;
    bottom:145px;
    width:100%;
    left:0;
    text-align:center;
    color:#ffd600;
    font-size:21px;
    font-weight:bold;
}

.reward-btn{
    position:absolute;
    left:50%;
    bottom:72px;
    transform:translateX(-50%);
    width:78%;
    height:64px;
    border-radius:20px;
    border:2px solid #ffd600;
    background:rgba(255,255,255,.08);
    color:white;
    font-size:25px;
    font-weight:900;
    box-shadow:0 0 18px rgba(255,214,0,.55), inset 0 0 18px rgba(0,255,255,.35);
    cursor:pointer;
}

.reward-btn:disabled{
    opacity:.6;
    cursor:not-allowed;
}

.progress-wrap{
    position:absolute;
    left:50%;
    bottom:52px;
    transform:translateX(-50%);
    width:72%;
    height:6px;
    background:#222;
    border-radius:20px;
    overflow:hidden;
}

.progress-bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#ffd600,#00eaff);
    border-radius:20px;
}

.coin{
    position:absolute;
    top:-40px;
    width:26px;
    height:26px;
    border-radius:50%;
    background:radial-gradient(circle at 30% 30%,#fff7a8,#ffd000,#b77900);
    box-shadow:0 0 10px rgba(255,214,0,.8);
    animation:fall linear forwards;
    z-index:4;
}

.coin::after{
    content:'$';
    color:#7a4a00;
    font-weight:bold;
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    font-size:14px;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
        opacity:.3;
    }
}

.success-text{
    display:none;
    position:absolute;
    left:0;
    bottom:130px;
    width:100%;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    color:#5cff4a;
    padding:0 20px;
    box-sizing:border-box;
}

.failed-text{
    color:#ff4d4f;
}
</style>
</head>

<body>

<div class="reward-page">

    <div class="wallet-box">
        <div class="wallet-label">
            Wallet<br>Account:
        </div>

        <div class="wallet-value">
            {{ request.user.userprofile.balance|floatformat:2 }}
            <span>USD</span>
        </div>
    </div>

    <div class="title">
        Fund Awards
    </div>

    <div class="subtitle">
        Congratulations on receiving the<br>
        funding award!
    </div>

    <div class="amount-area">
        <div class="gold-wave"></div>

        <div class="amount-text">
            <span class="x">x</span>
            <span id="countAmount">0.00</span>
            <span class="usd">USD</span>
        </div>
    </div>

    <div class="success-text" id="successText">
        Reward is ready to claim!
    </div>

    <div class="note">
        Bonuses will increase over time
    </div>

    <button class="reward-btn" id="rewardButton" disabled>
        Loading Reward
    </button>

    <div class="progress-wrap">
        <div class="progress-bar" id="progressBar"></div>
    </div>

</div>

<script>
const payoutAmount = parseFloat("{{ reward.payout_amount }}");
const jumpTime = parseInt("{{ reward.payout_jump_time }}") || 10;
const claimUrl = "{% url 'claim_lucky_reward' reward.id %}";
const claimFailed = "{{ claim_failed|default:False }}" === "True";

const amountEl = document.getElementById("countAmount");
const progressBar = document.getElementById("progressBar");
const successText = document.getElementById("successText");
const rewardButton = document.getElementById("rewardButton");

let startTime = null;
let animationFinished = false;

function animateAmount(timestamp){
    if(!startTime){
        startTime = timestamp;
    }

    const elapsed = (timestamp - startTime) / 1000;
    const progress = Math.min(elapsed / jumpTime, 1);
    const currentAmount = payoutAmount * progress;

    amountEl.innerText = currentAmount.toFixed(2);
    progressBar.style.width = (progress * 100) + "%";

    if(progress < 1){
        requestAnimationFrame(animateAmount);
    }else{
        animationFinished = true;
        amountEl.innerText = payoutAmount.toFixed(2);
        successText.style.display = "block";

        if(claimFailed){
            successText.innerText = "Claim failed. Please contact customer service.";
            successText.classList.add("failed-text");
            rewardButton.innerText = "Waiting for CS Confirm";
            rewardButton.disabled = true;
        }else{
            successText.innerText = "Reward is ready to claim!";
            successText.classList.remove("failed-text");
            rewardButton.innerText = "Getting the Reward";
            rewardButton.disabled = false;
        }
    }
}

rewardButton.addEventListener("click", function(){
    if(!animationFinished){
        return;
    }

    if(claimFailed){
        return;
    }

    rewardButton.disabled = true;
    rewardButton.innerText = "Claiming...";
    window.location.href = claimUrl;
});

function createCoin(){
    const coin = document.createElement("div");
    coin.className = "coin";
    coin.style.left = Math.random() * 100 + "vw";
    coin.style.animationDuration = (2 + Math.random() * 2) + "s";
    document.body.appendChild(coin);

    setTimeout(function(){
        coin.remove();
    }, 4500);
}

setInterval(createCoin, 180);
requestAnimationFrame(animateAmount);
</script>

</body>
</html>
