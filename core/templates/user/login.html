<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{box-sizing:border-box}

        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#f3f4f6;
        }

        .mobile-page{
            max-width:430px;
            min-height:100vh;
            margin:0 auto;
            background:#f3f4f6;
        }

        .topbar{
            height:50px;
            background:#000;
            color:white;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:22px;
            font-weight:bold;
            position:relative;
        }

        .logo-box{
            width:190px;
            height:100px;
            background:white;
            margin:50px auto 24px;
            display:flex;
            align-items:center;
            justify-content:center;
            color:#999;
            font-size:22px;
        }

        .form-card{
            background:white;
            margin:0 22px;
            padding:10px 18px;
        }

        .form-group{
            border-bottom:1px solid #e5e7eb;
            padding:18px 0 14px;
        }

        .label{
            font-weight:bold;
            margin-bottom:10px;
        }

        input{
            width:100%;
            border:0;
            outline:0;
            font-size:15px;
        }

        input::placeholder{
            color:#b6bbc4;
        }

        .login-btn{
            width:calc(100% - 44px);
            height:58px;
            margin:28px auto 0;
            display:block;
            border:0;
            border-radius:4px;
            background:#2f5af7;
            color:white;
            font-size:22px;
            cursor:pointer;
        }

        .register-link{
            display:block;
            text-align:center;
            margin-top:18px;
            color:#2f5af7;
            text-decoration:none;
            font-weight:bold;
        }

        .message{
            width:calc(100% - 44px);
            margin:15px auto;
            padding:12px;
            border-radius:4px;
            font-size:14px;
            background:#fee2e2;
            color:#991b1b;
        }
    </style>
</head>

<body>

<div class="mobile-page">

    <div class="topbar">
        Login
    </div>

    <div class="logo-box">
        annalect
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="message">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="form-card">

            <div class="form-group">
                <div class="label">Username</div>
                <input type="text" name="username" placeholder="Username" required>
            </div>

            <div class="form-group">
                <div class="label">Password</div>
                <input type="password" name="password" placeholder="Password" required>
            </div>

        </div>

        <button type="submit" class="login-btn">
            Login
        </button>

        <a href="{% url 'user_register' %}" class="register-link">
            Create account
        </a>

    </form>

</div>

</body>
</html>
