{% extends 'user/base.html' %}

{% block title %}Update Email{% endblock %}

{% block extra_css %}
<style>

.content{
    padding:0 !important;
    background:#f5f5f5;
    min-height:100vh;
}

.topbar{
    height:42px;
    background:#000;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    font-size:17px;
    font-weight:bold;
}

.back-btn{
    position:absolute;
    left:14px;
    color:white;
    text-decoration:none;
    font-size:30px;
    line-height:1;
}

.page{
    padding:18px 14px 90px;
}

.form-card{
    background:white;
    padding:0 16px;
}

.form-row{
    min-height:58px;
    display:flex;
    align-items:center;
    border-bottom:1px solid #f1f1f1;
}

.form-label{
    color:#ff851c;
    font-weight:bold;
    width:120px;
    font-size:15px;
}

.form-input{
    flex:1;
    border:0;
    outline:none;
    font-size:15px;
    color:#111;
    text-align:right;
}

.form-input::placeholder{
    color:#c5c5c5;
}

.confirm-btn{
    width:100%;
    height:48px;
    background:#000;
    color:white;
    border:0;
    border-radius:4px;
    margin-top:80px;
    font-size:16px;
}

.message{
    background:#fff4e8;
    color:#c2410c;
    border:1px solid #ffd6b0;
    padding:10px;
    border-radius:6px;
    margin-bottom:12px;
    text-align:center;
    font-size:13px;
}

</style>
{% endblock %}

{% block content %}

<div class="topbar">

    <a href="{% url 'user_personal_information' %}" class="back-btn">
        ‹
    </a>

    Update Email

</div>

<div class="page">

    <form method="POST">

        {% csrf_token %}

        <div class="form-card">

            <div class="form-row">

                <div class="form-label">
                    E-mail
                </div>

                <input
                    type="email"
                    name="email"
                    class="form-input"
                    placeholder="Enter Email"
                    value="{{ request.user.email }}"
                    required
                >

            </div>

        </div>

        <button type="submit" class="confirm-btn">
            Confirm
        </button>

    </form>

</div>

{% endblock %}
