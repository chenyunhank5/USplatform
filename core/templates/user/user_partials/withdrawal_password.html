<style>

.withdraw-modal-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.65);
    z-index:9999;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.withdraw-modal-box{
    width:310px;
    background:white;
    padding:28px 24px 26px;
    position:relative;
    border-radius:4px;
}

.withdraw-modal-close{
    position:absolute;
    top:10px;
    right:14px;
    background:none;
    border:0;
    font-size:28px;
    cursor:pointer;
    color:#000;
}

.withdraw-modal-title{
    text-align:center;
    font-size:16px;
    font-weight:bold;
    margin-bottom:18px;
    color:#000;
}

.withdraw-modal-input{
    width:100%;
    height:48px;
    border:1px solid #ddd;
    outline:none;
    padding:0 14px;
    font-size:14px;
    text-align:center;
    margin-bottom:18px;
}

.withdraw-modal-input::placeholder{
    color:#b8bdc6;
}

.withdraw-modal-confirm{
    width:100%;
    height:48px;
    background:#ff851c;
    color:white;
    border:0;
    border-radius:4px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

</style>


<div class="withdraw-modal-overlay" id="withdrawPasswordModal">

    <div class="withdraw-modal-box">

        <button
            type="button"
            class="withdraw-modal-close"
            onclick="closeWithdrawPasswordModal()"
        >
            ×
        </button>

        <div class="withdraw-modal-title">
            Enter Transaction Password
        </div>

        <input
            type="password"
            id="withdrawTransactionPassword"
            class="withdraw-modal-input"
            placeholder="Enter Transaction Password"
        >

        <button
            type="button"
            class="withdraw-modal-confirm"
            onclick="confirmWithdrawPassword()"
        >
            Confirm
        </button>

    </div>

</div>


<script>
let passwordRedirectUrl = "";

function openWithdrawPasswordModal(redirectUrl){
    passwordRedirectUrl = redirectUrl;
    document.getElementById('withdrawPasswordModal').style.display = 'flex';
}

function closeWithdrawPasswordModal(){
    document.getElementById('withdrawPasswordModal').style.display = 'none';
}

function getCookie(name){
    let cookieValue = null;

    if(document.cookie && document.cookie !== ''){
        const cookies = document.cookie.split(';');

        for(let i = 0; i < cookies.length; i++){
            const cookie = cookies[i].trim();

            if(cookie.substring(0, name.length + 1) === (name + '=')){
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }

    return cookieValue;
}

function confirmWithdrawPassword(){
    const password = document.getElementById('withdrawTransactionPassword').value.trim();

    if(!password){
        alert('Please enter transaction password.');
        return;
    }

    fetch("{% url 'verify_withdrawal_password' %}", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            "X-CSRFToken": getCookie("csrftoken")
        },
        body: "transaction_password=" + encodeURIComponent(password)
    })
    .then(response => response.json())
    .then(data => {
        if(data.success){
            window.location.href = passwordRedirectUrl;
        }else{
            alert(data.message || "Incorrect transaction password.");
        }
    });
}
</script>
